dtu_python_version: &dtu_python_version python 3.12.*

name: Miniforge3
company: "DTU Python Installation Support"
initialize_by_default: True

user_requested_specs:
  - *dtu_python_version
  - dtumathtools
  - matplotlib >=3.8
  - pandas
  - scipy
  - statsmodels
  - uncertainties

specs:
  - *dtu_python_version
  - dtumathtools
  - matplotlib >=3.8
  - pandas
  - scipy
  - statsmodels
  - uncertainties

# We have access to these variables:
# - dtu_year
# - dtu_semester
extra_envs:
  01001-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python_version
      - dtumathtools
      - matplotlib >=3.8
  02002-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python_version
  02402-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python_version
      - matplotlib >=3.8
      - pandas
      - scipy
      - statsmodels
  10060-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python_version
      - matplotlib >=3.8
      - pandas
      - scipy
      - uncertainties
