# Shortcuts for generalized output
dtu_python: &dtu_python python 3.12.*
dtu_dtumathtools: &dtu_dtumathtools dtumathtools =2025
dtu_matplotlib: &dtu_matplotlib matplotlib >=3.8

dtu_jinja_variables:
  dtu_semester: A
  dtu_year: 2026

name: Miniforge3
company: "DTU Python Installation Support"
initialize_by_default: True

user_requested_specs:
  - *dtu_python
  - *dtu_dtumathtools
  - matplotlib >=3.8
  - pandas
  - scipy
  - statsmodels
  - uncertainties

specs:
  - *dtu_python
  - *dtu_dtumathtools
  - *dtu_matplotlib
  - pandas
  - scipy
  - statsmodels
  - uncertainties

# We have access to these variables:
# - dtu_year
# - dtu_semester
extra_envs:
  01001-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python
      - *dtu_dtumathtools
      - *dtu_matplotlib
  02002-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python
  02402-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python
      - *dtu_matplotlib
      - pandas
      - scipy
      - statsmodels
  10060-{{ dtu_semester }}{{ dtu_year[2:] }}:
    channels:
      - conda-forge
    specs:
      - *dtu_python
      - *dtu_matplotlib
      - pandas
      - scipy
      - uncertainties
